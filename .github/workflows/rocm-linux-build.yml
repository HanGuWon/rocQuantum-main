name: ROCm Linux Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  python-tests:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    defaults:
      run:
        shell: bash
        working-directory: rocQuantum-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install numpy scipy pytest

      - name: Installability Smoke Test
        run: |
          python -c "import rocq; import rocquantum"
          python -m rocq_cli --help

      - name: Run Unit Tests
        run: |
          python -m unittest tests.test_p0_fixes -v
          python -m unittest tests.test_p1_compiler -v
          python -m unittest tests.test_p2_packaging -v
          python -m unittest tests.test_runtime_api_contract -v
          python -m unittest tests.test_legacy_python_api -v
          python -m unittest tests.test_statevec_fastpath_contract -v
          python -m unittest tests.test_cirq_integration -v
          python -m unittest tests.test_pennylane_integration -v
          python -m unittest tests.test_cpp_expectation -v
          python -m unittest tests.test_benchmark_release_contract -v
          python -m unittest tests.test_rocm_compatibility_contract -v

  build:
    name: Build ROCm ${{ matrix.rocm_label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rocm_image: rocm/dev-ubuntu-22.04:6.2.2
            rocm_label: "6.2.2"
            experimental: false
            hip_architectures: "gfx942;gfx90a"
          - rocm_image: rocm/dev-ubuntu-22.04:7.2.4
            rocm_label: "7.2.4"
            experimental: true
            hip_architectures: "gfx950;gfx942;gfx90a"
    continue-on-error: ${{ matrix.experimental }}
    runs-on: ubuntu-22.04
    container:
      image: ${{ matrix.rocm_image }}
    defaults:
      run:
        shell: bash
        working-directory: rocQuantum-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            python3-dev \
            python3-pip \
            ripgrep \
            pybind11-dev

      - name: Async Contract Gate
        run: bash scripts/check_async_contract.sh

      - name: Configure
        env:
          CMAKE_PREFIX_PATH: /opt/rocm
        run: |
          cmake -S . -B build-ci -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_HIP_COMPILER=/opt/rocm/bin/hipcc \
            -DCMAKE_HIP_ARCHITECTURES="${{ matrix.hip_architectures }}"

      - name: Build
        run: cmake --build build-ci --parallel

      - name: Validate CMake install-tree consumer
        env:
          ARTIFACT_DIR: ${{ github.workspace }}/ci-artifacts/rocm-linux-build-${{ matrix.rocm_label }}
        run: |
          set -o pipefail
          mkdir -p "${ARTIFACT_DIR}"
          export CMAKE_HIP_COMPILER="$(command -v hipcc)"
          export CMAKE_HIP_ARCHITECTURES="${{ matrix.hip_architectures }}"
          export ROCQUANTUM_INSTALL_PREFIX="${ARTIFACT_DIR}/install-prefix"
          export ROCQUANTUM_INSTALL_CONSUMER_BUILD_DIR="${ARTIFACT_DIR}/install-consumer-build"
          bash scripts/validate_cmake_install_consumer.sh build-ci \
            2>&1 | tee "${ARTIFACT_DIR}/cmake-install-consumer.log"

      - name: Run hipTensorNet Contraction Regression
        run: |
          if [ ! -e /dev/kfd ]; then
            echo "No ROCm runtime device detected. Skipping GPU runtime tests."
            exit 0
          fi
          ctest --test-dir build-ci --output-on-failure -R HipTensorNetContractionRegression

      - name: Run release benchmark registry
        if: always()
        env:
          ARTIFACT_DIR: ${{ github.workspace }}/ci-artifacts/rocm-linux-build-${{ matrix.rocm_label }}
        run: |
          set -o pipefail
          mkdir -p "${ARTIFACT_DIR}"
          python3 benchmarks/run_release_benchmarks.py \
            --build-dir build-ci \
            --output-dir "${ARTIFACT_DIR}/benchmark-artifacts" \
            --fail-on-error \
            2>&1 | tee "${ARTIFACT_DIR}/benchmark-runner.log"
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f "${ARTIFACT_DIR}/benchmark-artifacts/benchmark-summary.md" ]; then
            cat "${ARTIFACT_DIR}/benchmark-artifacts/benchmark-summary.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload ROCm build benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rocm-linux-build-${{ matrix.rocm_label }}-${{ github.run_id }}
          path: ci-artifacts/rocm-linux-build-${{ matrix.rocm_label }}
          if-no-files-found: warn
          retention-days: 14
